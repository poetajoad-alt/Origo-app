<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#082632">

  <title>Origo | Página principal</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <link rel="stylesheet" href="principal.css">
  <script type="module" src="auth-guard.js"></script>
</head>

<body>
  <div class="principal-page">

    <!-- Cabeçalho fixo -->
    <header class="principal-header">

      <button class="header-button" id="open-menu-button" type="button" aria-label="Abrir menu" aria-controls="side-menu-layer" aria-expanded="false">
        <img class="header-menu-icon" src="assets/menu-vector.png" alt="" aria-hidden="true">
      </button>

      <a class="header-logo-link" href="principal.html" aria-label="Voltar para a página principal">
        <img class="header-logo" src="assets/origo-vector.png" alt="Origo">
      </a>

      <button class="header-button" id="open-search-button" type="button" aria-label="Abrir pesquisa">
        <img class="header-search-icon" src="assets/lupa-vector.png" alt="" aria-hidden="true">
      </button>

    </header>

    <!-- Menu lateral -->
    <div class="side-menu-layer" id="side-menu-layer" aria-hidden="true">

      <button class="side-menu-overlay" id="side-menu-overlay" type="button" aria-label="Fechar menu lateral"></button>

      <aside class="side-menu" id="side-menu" aria-label="Menu principal" tabindex="-1">

        <!-- Dados do usuário -->
        <header class="side-menu-header">

          <button class="side-menu-close-button" id="close-menu-button" type="button" aria-label="Fechar menu">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" />
            </svg>
          </button>

          <div class="side-menu-user">

            <div class="side-menu-avatar">

              <span class="side-menu-avatar-placeholder" id="side-menu-avatar-placeholder" aria-hidden="true">
                O
              </span>

              <img class="side-menu-avatar-image" id="side-menu-user-photo" src="" alt="Foto do usuário" hidden>

            </div>

            <div class="side-menu-user-information">

              <strong class="side-menu-user-name" id="side-menu-user-name">
                Nome do Usuário
              </strong>

              <span class="side-menu-user-email" id="side-menu-user-email">
                usuario@email.com
              </span>

            </div>

          </div>

        </header>

        <!-- Navegação -->
        <nav class="side-menu-navigation" aria-label="Navegação principal">

          <a class="side-menu-link is-active" href="principal.html" aria-current="page">
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M3 11.5L12 4L21 11.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

              <path d="M5.5 10.5V20H18.5V10.5" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />

              <path d="M9.5 20V14H14.5V20" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            </svg>

            <span>Início</span>
          </a>

          <a class="side-menu-link" href="meu-perfil.html">
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" />

              <path d="M4.5 21C5.2 16.7 7.8 14.5 12 14.5C16.2 14.5 18.8 16.7 19.5 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>

            <span>Meu Perfil</span>
          </a>
          <a class="side-menu-link" href="admin-eventos.html" id="side-menu-admin-link" hidden>
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="4" y="5" width="16" height="15" rx="2" stroke="currentColor" stroke-width="2" />

              <path d="M8 5V3M16 5V3M8 10H16M8 14H12" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>

            <span>Painel Admin</span>
          </a>

          <a class="side-menu-link" href="#events-title" id="side-menu-events-link">
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <rect x="3.5" y="5.5" width="17" height="15" rx="2" stroke="currentColor" stroke-width="2" />

              <path d="M7 3V8M17 3V8M3.5 10H20.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>

            <span>Eventos</span>


          </a>

          <a class="side-menu-link" href="mapa.html">
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M9 18L3.5 21V6L9 3L15 6L20.5 3V18L15 21L9 18Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />

              <path d="M9 3V18M15 6V21" stroke="currentColor" stroke-width="2" />
            </svg>

            <span>Mapa</span>
          </a>

          <a class="side-menu-link" href="conexoes.html">
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="9" cy="8" r="3.5" stroke="currentColor" stroke-width="2" />

              <circle cx="17" cy="9" r="2.5" stroke="currentColor" stroke-width="2" />

              <path d="M2.5 20C3 16.5 5.1 14.5 9 14.5C12.9 14.5 15 16.5 15.5 20" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

              <path d="M15 15C18.6 14.8 20.6 16.4 21 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>

            <span>Conexões</span>
          </a>

          <a class="side-menu-link" href="notificacoes.html" data-coming-soon="true">
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M6 17H18L16.5 14.5V10C16.5 7.5 14.5 5.5 12 5.5C9.5 5.5 7.5 7.5 7.5 10V14.5L6 17Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />

              <path d="M10 20H14" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

              <path d="M12 3V5" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            </svg>

            <span>Notificações</span>

            <small class="side-menu-coming-soon">
              Em breve
            </small>
          </a>

          <a class="side-menu-link" href="configuracoes.html" data-coming-soon="true">
            <svg class="side-menu-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />

              <path d="M19 13.5V10.5L16.8 9.8C16.6 9.2 16.3 8.7 15.9 8.2L16.4 6L13.8 4.5L12.2 6.1C11.6 6 11 6 10.4 6.1L8.8 4.5L6.2 6L6.7 8.2C6.3 8.7 6 9.2 5.8 9.8L3.6 10.5V13.5L5.8 14.2C6 14.8 6.3 15.3 6.7 15.8L6.2 18L8.8 19.5L10.4 17.9C11 18 11.6 18 12.2 17.9L13.8 19.5L16.4 18L15.9 15.8C16.3 15.3 16.6 14.8 16.8 14.2L19 13.5Z" stroke="currentColor" stroke-width="1.7" stroke-linejoin="round" />
            </svg>

            <span>Configurações</span>

            <small class="side-menu-coming-soon">
              Em breve
            </small>
          </a>

        </nav>

        <!-- Rodapé do menu -->
        <footer class="side-menu-footer">

          <button class="side-menu-logout-button" id="logout-button" type="button">
            <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M10 5H5V19H10" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />

              <path d="M14 8L18 12L14 16M18 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
            </svg>

            <span>Sair</span>
          </button>

          <p class="side-menu-version">
            Origo • Versão 0.1
          </p>

        </footer>

      </aside>

    </div>

    <main class="principal-content">

      <!-- Carrossel principal -->
      <section class="banner-carousel" id="banner-carousel" aria-label="Destaques da Origo">

        <a class="banner-link" id="banner-link" href="#" aria-label="Abrir destaque">
          <img class="banner-image" id="banner-image" src="assets/banner-1.jpg" alt="Destaque da comunidade Origo">
        </a>

        <div class="banner-indicators" id="banner-indicators" aria-label="Selecionar banner"></div>

      </section>

      <!-- Seção de eventos -->
      <!-- Seção de eventos -->
      <section class="events-section" aria-labelledby="events-title">
        <div class="events-heading">

          <h2 class="section-title" id="events-title">
            Eventos
          </h2>

          <span class="events-swipe-hint">
            Deslize para o lado
          </span>

        </div>

        <div class="events-track" id="events-track" aria-label="Lista de eventos" aria-live="polite">
          <p class="events-loading">
            Carregando eventos...
          </p>
        </div>

      </section>

      <!-- Seção do mapa da comunidade -->
      <section class="map-section" aria-labelledby="map-section-title">
        <div class="section-heading map-section-heading">

          <h2 class="section-title" id="map-section-title">
            Encontre Jogadores
          </h2>

          <a class="section-link" href="mapa.html">
            Abrir mapa
          </a>

        </div>

        <article class="map-card">

          <div class="map-preview-wrapper">

            <div class="community-map-preview" id="community-map-preview" role="img" aria-label="Prévia do mapa da comunidade com jogadores, lojas e eventos próximos"></div>

            <a class="map-preview-open" href="mapa.html" aria-label="Abrir o mapa completo da comunidade Origo">
              <span class="map-preview-open-label">

                <span>Explorar mapa</span>

                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M5 12H19M13 6L19 12L13 18" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>

              </span>
            </a>

          </div>

          <div class="map-legend" aria-label="Legenda dos marcadores">

            <div class="map-legend-item">
              <span class="map-legend-pin map-legend-pin-player" aria-hidden="true"></span>

              <span>Jogadores</span>
            </div>

            <div class="map-legend-item">
              <span class="map-legend-pin map-legend-pin-store" aria-hidden="true"></span>

              <span>Lojas</span>
            </div>

            <div class="map-legend-item">
              <span class="map-legend-pin map-legend-pin-event" aria-hidden="true"></span>

              <span>Eventos</span>
            </div>

          </div>

        </article>

      </section>

      <!-- As próximas seções serão inseridas aqui -->

    </main>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script type="module" src="principal.js"></script>

  <script type="module" src="principal-auth.js"></script>

</body>

</html>
