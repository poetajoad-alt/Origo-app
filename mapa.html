<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="theme-color" content="#082632">

  <link rel="manifest" href="./manifest.webmanifest">

  <link rel="icon" type="image/png" sizes="192x192" href="./assets/icons/icon-192.png">

  <link rel="apple-touch-icon" href="./assets/icons/apple-touch-icon.png">

  <meta name="mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-capable" content="yes">

  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <meta name="apple-mobile-web-app-title" content="Origo">

  <title>Origo | Mapa</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

  <link rel="stylesheet" href="mapa.css?v=5">
  <script type="module" src="auth-guard.js"></script>
</head>

<body>
  <main class="map-page">

    <!-- Cabeçalho -->
    <header class="map-header">

      <a class="map-header-button" href="principal.html" aria-label="Voltar para a página principal">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 5L8 12L15 19" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </a>

      <h1 class="map-title">
        Mapa
      </h1>

      <a class="map-logo-link" href="principal.html" aria-label="Ir para o início">
        <img class="map-logo" src="assets/origo-vector.png" alt="Origo">
      </a>

    </header>

    <!-- Área principal do mapa -->
    <section class="map-interface" aria-label="Mapa da comunidade Origo">

      <div class="community-map" id="community-map"></div>

      <!-- Filtros -->
      <div class="map-filters" role="group" aria-label="Filtrar pontos do mapa">

        <button class="map-filter-button is-active" type="button" data-map-filter="all" aria-pressed="true">
          Todos
        </button>

        <button class="map-filter-button" type="button" data-map-filter="player" aria-pressed="false">
          <span class="filter-color filter-color-player" aria-hidden="true"></span>

          Jogadores
        </button>

        <button class="map-filter-button" type="button" data-map-filter="store" aria-pressed="false">
          <span class="filter-color filter-color-store" aria-hidden="true"></span>

          Lojas
        </button>

        <button class="map-filter-button" type="button" data-map-filter="event" aria-pressed="false">
          <span class="filter-color filter-color-event" aria-hidden="true"></span>

          Eventos
        </button>

      </div>

      <!-- Botão de localização -->
      <button class="map-location-button" id="locate-user-button" type="button" aria-label="Encontrar minha localização" title="Minha localização">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2.2" />

          <path d="M12 2V5M12 19V22M2 12H5M19 12H22" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />

          <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.7" />
        </svg>
      </button>

      <!-- Mensagens do mapa -->
      <p class="map-status" id="map-status" role="status" aria-live="polite" hidden></p>

    </section>

    <!-- Painel inferior -->
    <aside class="map-bottom-sheet" id="map-bottom-sheet" aria-hidden="true" aria-labelledby="map-sheet-title">
      <div class="map-sheet-handle" aria-hidden="true"></div>

      <button class="map-sheet-close" id="map-sheet-close" type="button" aria-label="Fechar informações">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" />
        </svg>
      </button>

      <div class="map-sheet-heading">
        <span class="map-sheet-type" id="map-sheet-type">
          Jogador
        </span>

        <span class="map-sheet-availability" id="map-sheet-availability" hidden>
          Disponível agora
        </span>
      </div>

      <h2 class="map-sheet-title" id="map-sheet-title">
        Nome do ponto
      </h2>

      <p class="map-sheet-subtitle" id="map-sheet-subtitle"></p>

      <div class="map-sheet-details" id="map-sheet-details"></div>

      <div class="map-sheet-actions" id="map-sheet-actions" hidden>
        <button class="map-sheet-invite-button" id="map-sheet-invite-button" type="button">
          Convidar para Jogar
        </button>
      </div>
    </aside>

    <!-- Painel para envio de convite -->
    <div class="invite-layer" id="invite-layer" aria-hidden="true" hidden>
      <button class="invite-overlay" id="invite-overlay" type="button" aria-label="Fechar convite"></button>

      <section class="invite-panel" role="dialog" aria-modal="true" aria-labelledby="invite-title">
        <div class="invite-handle" aria-hidden="true"></div>

        <button class="invite-close-button" id="invite-close-button" type="button" aria-label="Fechar">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M6 6L18 18M18 6L6 18" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" />
          </svg>
        </button>

        <span class="invite-label">
          Convite
        </span>

        <h2 class="invite-title" id="invite-title">
          Convidar para Jogar
        </h2>

        <p class="invite-recipient">
          Enviar convite para
          <strong id="invite-recipient-name">
            Jogador
          </strong>
        </p>
        <p class="invite-instruction">
          Como você quer jogar?
        </p>

        <div class="invite-modality-options" role="group" aria-label="Escolher modalidade da partida">
          <button class="invite-modality-button" type="button" data-invite-modality="presencial" aria-pressed="false">
            Presencial
          </button>

          <button class="invite-modality-button" type="button" data-invite-modality="online" aria-pressed="false">
            Online
          </button>
        </div>
        <div class="invite-match-details" id="invite-match-details" hidden>
          <p class="invite-instruction">
            Detalhes da partida
          </p>

          <div class="invite-field">
            <label class="invite-field-label" for="invite-tcg">
              TCG
            </label>

            <select class="invite-field-control" id="invite-tcg">
              <option value="">
                Selecione o TCG
              </option>

              <option value="Pokémon">
                Pokémon
              </option>

              <option value="Yu-Gi-Oh!">
                Yu-Gi-Oh!
              </option>

              <option value="Magic">
                Magic
              </option>

              <option value="Lorcana">
                Lorcana
              </option>
            </select>
          </div>

          <div class="invite-field">
            <label class="invite-field-label" for="invite-format">
              Formato
            </label>

            <input class="invite-field-control" id="invite-format" type="text" maxlength="60" placeholder="Ex.: Standard, Commander ou Casual" autocomplete="off">
          </div>

          <div class="invite-date-time-grid">
            <div class="invite-field">
              <label class="invite-field-label" for="invite-date">
                Data
              </label>

              <input class="invite-field-control" id="invite-date" type="date">
            </div>

            <div class="invite-field">
              <label class="invite-field-label" for="invite-time">
                Horário
              </label>

              <input class="invite-field-control" id="invite-time" type="time">
            </div>
          </div>

          <div class="invite-field" id="invite-location-field" hidden>
            <label class="invite-field-label" for="invite-location">
              Local da partida
            </label>

            <input class="invite-field-control" id="invite-location" type="text" maxlength="120" placeholder="Ex.: loja, shopping ou espaço público" autocomplete="off">

            <p class="invite-field-hint">
              Prefira combinar a partida em um local público.
            </p>
          </div>
        </div>
        <p class="invite-instruction">
          Escolha uma mensagem:
        </p>

        <div class="invite-message-options" role="group" aria-label="Mensagens disponíveis">
          <!-- Mensagens presenciais -->

          <button class="invite-message-button" type="button" data-invite-message="Vamos jogar presencialmente?" data-invite-for="presencial" aria-pressed="false" hidden>
            Vamos jogar presencialmente?
          </button>

          <button class="invite-message-button" type="button" data-invite-message="Está disponível hoje?" data-invite-for="presencial" aria-pressed="false" hidden>
            Está disponível hoje?
          </button>

          <button class="invite-message-button" type="button" data-invite-message="Qual TCG você joga?" data-invite-for="presencial" aria-pressed="false" hidden>
            Qual TCG você joga?
          </button>

          <button class="invite-message-button" type="button" data-invite-message="Qual formato você prefere?" data-invite-for="presencial" aria-pressed="false" hidden>
            Qual formato você prefere?
          </button>

          <button class="invite-message-button" type="button" data-invite-message="Quer marcar uma partida presencial?" data-invite-for="presencial" aria-pressed="false" hidden>
            Quer marcar uma partida presencial?
          </button>

          <!-- Mensagens online -->

          <button class="invite-message-button" type="button" data-invite-message="Vamos jogar online agora?" data-invite-for="online" aria-pressed="false" hidden>
            Vamos jogar online agora?
          </button>

          <button class="invite-message-button" type="button" data-invite-message="Quer marcar uma partida online?" data-invite-for="online" aria-pressed="false" hidden>
            Quer marcar uma partida online?
          </button>

          <button class="invite-message-button" type="button" data-invite-message="Qual TCG você quer jogar?" data-invite-for="online" aria-pressed="false" hidden>
            Qual TCG você quer jogar?
          </button>

          <button class="invite-message-button" type="button" data-invite-message="Qual formato você prefere?" data-invite-for="online" aria-pressed="false" hidden>
            Qual formato você prefere?
          </button>

          <button class="invite-message-button" type="button" data-invite-message="Você consegue jogar por vídeo?" data-invite-for="online" aria-pressed="false" hidden>
            Você consegue jogar por vídeo?
          </button>
        </div>
        <p class="invite-form-message" id="invite-form-message" role="status" aria-live="polite" hidden></p>
        <div class="invite-actions">
          <button class="invite-cancel-button" id="invite-cancel-button" type="button">
            Cancelar
          </button>

          <button class="invite-send-button" id="invite-send-button" type="button" disabled>
            Enviar convite
          </button>
        </div>
      </section>
    </div>

  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script type="module" src="mapa.js?v=6"></script>
  <script src="./pwa-register.js" defer></script>

</body>

</html>
